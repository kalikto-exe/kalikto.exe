<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KALIKTO // NODE_INITIALIZATION</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0a0a0a;
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            padding: 20px;
        }

        .terminal-container {
            max-width: 600px;
            width: 100%;
            text-align: left;
            background: rgba(20, 20, 20, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 4px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        .status-header {
            display: flex;
            align-items: center;
            margin-bottom: 25px;
            font-size: 0.9rem;
            letter-spacing: 1px;
            color: #888888;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: #ffcc00; /* Amber warning color for standby */
            border-radius: 50%;
            margin-right: 10px;
            animation: pulse 1.5s infinite alternate;
            box-shadow: 0 0 8px #ffcc00;
        }

        h1 {
            font-size: 1.6rem;
            font-weight: normal;
            letter-spacing: 2px;
            margin-bottom: 15px;
            color: #ffffff;
        }

        p {
            font-size: 1rem;
            line-height: 1.6;
            color: #cccccc;
            margin-bottom: 25px;
        }

        .progress-container {
            width: 100%;
            background-color: rgba(255, 255, 255, 0.05);
            height: 4px;
            border-radius: 2px;
            position: relative;
            overflow: hidden;
            margin-bottom: 15px;
        }

        .progress-bar {
            width: 75%; /* Set static placeholder percentage */
            background-color: #ffffff;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            animation: load-shimmer 2s infinite linear;
        }

        .meta-line {
            font-size: 0.8rem;
            color: #555555;
            display: flex;
            justify-content: space-between;
        }

        @keyframes pulse {
            from { opacity: 0.4; box-shadow: 0 0 2px #ffcc00; }
            to { opacity: 1; box-shadow: 0 0 10px #ffcc00; }
        }

        @keyframes load-shimmer {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }

        @media (max-width: 480px) {
            h1 { font-size: 1.3rem; }
            p { font-size: 0.9rem; }
        }
    </style>
</head>
<body>

    <div class="terminal-container">
        <div class="status-header">
            <span class="status-dot"></span>
            <span>SYS_STAGING // INJECTING_ASSETS</span>
        </div>
        
        <h1>SYSTEM LOADING...</h1>
        <p>The updated portfolio core logic, automation directory, and custom interface layers are currently being mapped to this node. The environment will be fully operational in a few days.</p>
        
        <div class="progress-container">
            <div class="progress-bar"></div>
        </div>
        
        <div class="meta-line">
            <span>OPERATOR: SMIT MEHTA</span>
            <span>STATUS: 75%_STAGED</span>
        </div>
    </div>

</body>
</html>
